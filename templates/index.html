<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetProbe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ── */
:root {
    --primary: #2563EB;
    --primary-hover: #1D4ED8;
    --primary-light: #DBEAFE;
    --primary-bg: #EFF6FF;
    --secondary: #3B82F6;
    --cta: #F97316;
    --cta-hover: #EA580C;
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --border: #E2E8F0;
    --border-focus: #2563EB;
    --text: #1E293B;
    --text-secondary: #475569;
    --text-muted: #94A3B8;
    --success: #10B981;
    --success-bg: #ECFDF5;
    --success-text: #065F46;
    --warning: #F59E0B;
    --warning-bg: #FFFBEB;
    --warning-text: #92400E;
    --danger: #EF4444;
    --danger-bg: #FEF2F2;
    --danger-text: #991B1B;
    --info: #3B82F6;
    --info-bg: #EFF6FF;
    --info-text: #1E40AF;
    --mono: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    --sans: 'Fira Sans', -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow-xs: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
    --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -4px rgba(0,0,0,0.04);
    --transition: 200ms ease;
}

/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* ── Accessibility ── */
:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
    }
}

/* ── Layout ── */
.container {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 20px 48px;
}

/* ── Header ── */
.header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 28px 0;
}
.header-inner {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
}
.brand {
    display: flex;
    align-items: center;
    gap: 12px;
}
.brand-icon {
    width: 36px;
    height: 36px;
    background: var(--primary);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.brand-icon svg { width: 20px; height: 20px; }
.brand h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
}
.brand p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 1px;
}
.header-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
.badge-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    white-space: nowrap;
}
.badge-chip svg { width: 13px; height: 13px; opacity: 0.6; }

/* ── Card ── */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-top: 20px;
    box-shadow: var(--shadow-xs);
}
.card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}
.card-icon {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.card-icon svg { width: 17px; height: 17px; }
.card-icon.blue { background: var(--primary-bg); color: var(--primary); }
.card-icon.green { background: var(--success-bg); color: var(--success); }
.card-icon.orange { background: var(--warning-bg); color: var(--warning); }
.card-head h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
}

/* ── Form ── */
.form-group {
    display: flex;
    gap: 12px;
    align-items: stretch;
}
@media (max-width: 640px) {
    .form-group { flex-direction: column; }
}
textarea {
    flex: 1;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    resize: vertical;
    min-height: 96px;
    line-height: 1.6;
    transition: border-color var(--transition), box-shadow var(--transition);
}
textarea::placeholder { color: var(--text-muted); }
textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    outline: none;
}

.options {
    display: flex;
    gap: 4px;
    margin-top: 14px;
    flex-wrap: wrap;
}
.opt-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
    transition: background var(--transition), color var(--transition);
    border: 1px solid transparent;
}
.opt-label:hover { background: var(--bg); }
.opt-label:has(input:checked) {
    background: var(--primary-bg);
    color: var(--primary);
    border-color: var(--primary-light);
}
.opt-label input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: var(--primary);
    cursor: pointer;
}

/* ── Engine Selectors ── */
.engine-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
    margin-top: 16px;
}
.engine-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
}
.engine-item label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
}
.engine-item select {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 12px;
    font-family: var(--sans);
    color: var(--text-secondary);
    background: var(--surface);
    cursor: pointer;
}
.engine-item select:focus {
    border-color: var(--primary);
    outline: none;
}
.engine-item select option.disabled { color: var(--text-muted); }
.tool-status {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-left: 4px;
    flex-shrink: 0;
}
.tool-status.on { background: var(--success); }
.tool-status.off { background: var(--text-muted); }

/* ── Buttons ── */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 28px;
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
    text-decoration: none;
}
.btn svg { width: 16px; height: 16px; }
.btn-primary {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 2px 8px rgba(37,99,235,0.25);
}
.btn-primary:hover:not(:disabled) {
    background: var(--primary-hover);
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    transform: translateY(-1px);
}
.btn-primary:active:not(:disabled) { transform: translateY(0); }
.btn-primary:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}
.btn-sm {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    border-radius: var(--radius-sm);
}
.btn-outline {
    background: var(--surface);
    color: var(--text-secondary);
    border: 1.5px solid var(--border);
    box-shadow: none;
}
.btn-outline:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-bg);
}

/* ── Progress ── */
.progress-area { display: none; }
.progress-area.active { display: block; animation: fadeIn .3s ease-out; }

.progress-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
}
.spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--primary-light);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    flex-shrink: 0;
}

.log-box {
    background: #0F172A;
    color: #94A3B8;
    border-radius: var(--radius);
    padding: 16px 18px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.9;
    max-height: 340px;
    overflow-y: auto;
    border: 1px solid #1E293B;
}
.log-box::-webkit-scrollbar { width: 5px; }
.log-box::-webkit-scrollbar-track { background: transparent; }
.log-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
.log-box .ok { color: #34D399; }
.log-box .err { color: #F87171; }
.log-box .sep { color: #475569; }

/* ── Results ── */
.result-area { display: none; }
.result-area.active { display: block; animation: fadeIn .4s ease-out; }

.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
}
.stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    transition: border-color var(--transition);
}
.stat:hover { border-color: var(--primary-light); }
.stat-val {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
    font-family: var(--mono);
    line-height: 1.2;
}
.stat-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
}

.download-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
}
.download-bar span {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}

/* ── Target Groups ── */
.target-group {
    margin-bottom: 16px;
}
.target-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--primary-bg);
    border: 1px solid var(--primary-light);
    border-radius: var(--radius);
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary-hover);
}
.target-header svg { width: 15px; height: 15px; flex-shrink: 0; }
.target-count {
    margin-left: auto;
    font-weight: 400;
    color: var(--primary);
    font-size: 12px;
}

/* ── Host Card ── */
.host-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    transition: box-shadow var(--transition), border-color var(--transition);
}
.host-card:hover {
    box-shadow: var(--shadow-sm);
    border-color: #CBD5E1;
}
.host-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #F8FAFC;
    border-bottom: 1px solid var(--border);
    gap: 12px;
}
.host-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    font-family: var(--mono);
}
.host-ip {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
    flex-shrink: 0;
}
.host-body { padding: 14px 16px; }

.section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
}
.section-label:not(:first-child) { margin-top: 14px; }

/* ── Tables ── */
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 12.5px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
}
th {
    background: #F1F5F9;
    text-align: left;
    padding: 8px 12px;
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
}
td {
    padding: 8px 12px;
    border-bottom: 1px solid #F1F5F9;
    color: var(--text);
    vertical-align: middle;
}
tr:last-child td { border-bottom: none; }

/* ── Badges ── */
.tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
    letter-spacing: 0.2px;
}
.tag-green { background: var(--success-bg); color: var(--success-text); }
.tag-blue { background: var(--info-bg); color: var(--info-text); }
.tag-orange { background: var(--warning-bg); color: var(--warning-text); }
.web-title { color: var(--text-secondary); }
.no-data {
    text-align: center;
    padding: 16px;
    color: var(--text-muted);
    font-size: 13px;
}

/* ── Footer ── */
.footer {
    text-align: center;
    padding: 16px 20px;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 32px;
}

/* ── Animations ── */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ── Responsive ── */
@media (max-width: 768px) {
    .header-inner { flex-direction: column; align-items: flex-start; }
    .card { padding: 20px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
    .header-badges { gap: 4px; }
    .badge-chip { font-size: 11px; padding: 4px 10px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-inner">
        <div class="brand">
            <div class="brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
            </div>
            <div>
                <h1>NetProbe</h1>
                <p>域名综合探测平台</p>
            </div>
        </div>
        <div class="header-badges">
            <span class="badge-chip"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5a17.92 17.92 0 01-8.716-2.247m0 0A9 9 0 013 12c0-1.605.42-3.113 1.157-4.418"/></svg>子域名发现</span>
            <span class="badge-chip"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v9"/></svg>端口扫描</span>
            <span class="badge-chip"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0V12a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 12V5.25"/></svg>Web 探测</span>
        </div>
    </div>
</header>

<div class="container">

    <!-- Input Card -->
    <div class="card">
        <div class="card-head">
            <div class="card-icon blue">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
            </div>
            <h2>目标设定</h2>
        </div>
        <label for="target" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">输入扫描目标</label>
        <div class="form-group">
            <textarea id="target" placeholder="输入域名或 IP，多个目标用逗号或换行分隔&#10;&#10;example.com&#10;baidu.com, qq.com&#10;192.168.1.1" aria-label="扫描目标"></textarea>
            <button class="btn btn-primary" id="startBtn" onclick="startScan()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
                开始探测
            </button>
        </div>
        <div class="options">
            <label class="opt-label"><input type="checkbox" id="opt_dns_brute" checked /> 子域名枚举</label>
            <label class="opt-label"><input type="checkbox" id="opt_web" checked /> Web 探测</label>
            <label class="opt-label"><input type="checkbox" id="opt_validate" checked /> DNS 验证</label>
        </div>
        <div class="engine-grid" id="engineGrid">
            <div class="engine-item">
                <label><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;opacity:.6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5a17.92 17.92 0 01-8.716-2.247m0 0A9 9 0 013 12c0-1.605.42-3.113 1.157-4.418"/></svg>子域名</label>
                <select id="engine_subdomain"><option value="auto">自动</option><option value="subfinder">Subfinder</option><option value="nmap">Nmap</option></select>
            </div>
            <div class="engine-item">
                <label><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;opacity:.6"><path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v9"/></svg>端口扫描</label>
                <select id="engine_portscan"><option value="auto">自动</option><option value="masscan">Masscan</option><option value="rustscan">RustScan</option><option value="nmap">Nmap</option></select>
            </div>
            <div class="engine-item">
                <label><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;opacity:.6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5a17.92 17.92 0 01-8.716-2.247m0 0A9 9 0 013 12c0-1.605.42-3.113 1.157-4.418"/></svg>DNS</label>
                <select id="engine_dns"><option value="auto">自动</option><option value="dnsx">DNSx</option></select>
            </div>
            <div class="engine-item">
                <label><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;opacity:.6"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0V12a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 12V5.25"/></svg>Web</label>
                <select id="engine_web"><option value="auto">自动</option><option value="httpx">Httpx</option></select>
            </div>
        </div>
    </div>

    <!-- Progress Card -->
    <div class="card progress-area" id="progressArea" role="status" aria-live="polite">
        <div class="card-head">
            <div class="card-icon orange">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
            </div>
            <h2 id="progressTitle">扫描进行中</h2>
        </div>
        <div class="progress-bar" id="progressBar">
            <span class="spinner"></span>
            <span id="progressLabel">准备中...</span>
        </div>
        <div class="log-box" id="logBox" role="log" aria-live="polite"></div>
    </div>

    <!-- Results Card -->
    <div class="card result-area" id="resultArea">
        <div class="card-head">
            <div class="card-icon green">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <h2 id="resultTitle">探测结果</h2>
        </div>
        <div class="stats" id="summary"></div>
        <div class="download-bar" id="downloadBar"></div>
        <div id="hostList"></div>
    </div>
</div>

<footer class="footer">仅供授权安全测试使用</footer>

<script>
function startScan() {
    const target = document.getElementById('target').value.trim();
    if (!target) { document.getElementById('target').focus(); return; }

    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:1.5px"></span> 扫描中...';

    document.getElementById('progressArea').classList.add('active');
    document.getElementById('resultArea').classList.remove('active');
    document.getElementById('logBox').innerHTML = '';
    document.getElementById('hostList').innerHTML = '';
    document.getElementById('progressBar').style.display = 'flex';
    document.getElementById('progressLabel').textContent = '准备中...';

    const body = {
        target: target,
        no_dns_brute: !document.getElementById('opt_dns_brute').checked,
        no_web: !document.getElementById('opt_web').checked,
        no_validate: !document.getElementById('opt_validate').checked,
        subdomain_tool: document.getElementById('engine_subdomain').value,
        portscan_tool: document.getElementById('engine_portscan').value,
        dns_tool: document.getElementById('engine_dns').value,
        web_tool: document.getElementById('engine_web').value,
    };

    fetch('/api/scan', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { alert(data.error); resetBtn(); return; }
        listenStream(data.task_id);
    })
    .catch(err => { alert('请求失败: ' + err); resetBtn(); });
}

function listenStream(taskId) {
    const logBox = document.getElementById('logBox');
    const progressLabel = document.getElementById('progressLabel');
    const evtSource = new EventSource('/api/stream/' + taskId);

    evtSource.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const event = data.event;

        if (event === 'progress') {
            appendLog(data.text);
            progressLabel.textContent = data.text;
        } else if (event === 'done') {
            evtSource.close();
            appendLog('扫描完成!', true);
            progressLabel.textContent = '扫描完成';
            document.getElementById('progressBar').style.display = 'none';
            showResults(data.hosts, data.base_domain);
            resetBtn();
        } else if (event === 'error') {
            evtSource.close();
            appendLog(data.text, false, true);
            progressLabel.textContent = '扫描失败';
            resetBtn();
        }
    };

    evtSource.onerror = function() { evtSource.close(); resetBtn(); };
}

function appendLog(text, isOk, isErr) {
    const logBox = document.getElementById('logBox');
    const cls = isErr ? 'err' : (isOk ? 'ok' : '');
    if (text.includes('━━━')) {
        logBox.innerHTML += `<div class="sep">${escHtml(text)}</div>`;
    } else {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div class="${cls}"><span style="color:#475569">[${time}]</span> ${escHtml(text)}</div>`;
    }
    logBox.scrollTop = logBox.scrollHeight;
}

function resetBtn() {
    const btn = document.getElementById('startBtn');
    btn.disabled = false;
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg> 开始探测';
    document.getElementById('progressTitle').textContent = '扫描日志';
}

function showResults(hosts, baseDomain) {
    const area = document.getElementById('resultArea');
    area.classList.add('active');

    let totalPorts = 0, totalWeb = 0;
    hosts.forEach(h => { totalPorts += (h.ports||[]).length; totalWeb += (h.web_info||[]).length; });

    const groups = {};
    hosts.forEach(h => {
        const key = h.target || 'unknown';
        if (!groups[key]) groups[key] = [];
        groups[key].push(h);
    });
    const groupKeys = Object.keys(groups);

    document.getElementById('resultTitle').textContent = `探测结果 — ${groupKeys.length} 个目标`;
    document.getElementById('summary').innerHTML = `
        <div class="stat"><div class="stat-val">${groupKeys.length}</div><div class="stat-label">目标</div></div>
        <div class="stat"><div class="stat-val">${hosts.length}</div><div class="stat-label">主机</div></div>
        <div class="stat"><div class="stat-val">${totalPorts}</div><div class="stat-label">端口</div></div>
        <div class="stat"><div class="stat-val">${totalWeb}</div><div class="stat-label">Web</div></div>
    `;

    document.getElementById('downloadBar').innerHTML = `
        <span>导出:</span>
        <button class="btn btn-sm btn-outline" onclick="download('txt')">TXT</button>
        <button class="btn btn-sm btn-outline" onclick="download('csv')">CSV</button>
        <button class="btn btn-sm btn-outline" onclick="download('json')">JSON</button>
    `;

    const list = document.getElementById('hostList');
    list.innerHTML = '';
    let idx = 0;

    groupKeys.forEach(key => {
        const group = groups[key];
        let html = `<div class="target-group">
            <div class="target-header">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5a17.92 17.92 0 01-8.716-2.247m0 0A9 9 0 013 12c0-1.605.42-3.113 1.157-4.418"/></svg>
                ${escHtml(key)}
                <span class="target-count">${group.length} 个主机</span>
            </div>`;

        group.forEach(host => {
            idx++;
            const ports = host.ports || [];
            const webInfo = host.web_info || [];
            const banners = host.banners || [];
            const osInfo = host.os || '';

            let osHtml = '';
            if (osInfo) {
                osHtml = `<div class="section-label">操作系统</div><div style="padding:6px 0;font-size:13px"><span class="tag tag-blue">${escHtml(osInfo)}</span></div>`;
            }

            let portHtml = '';
            if (ports.length) {
                portHtml = '<div class="section-label">开放端口</div><table><tr><th>端口</th><th>状态</th><th>服务</th></tr>';
                ports.forEach(p => {
                    const svc = [p.service, p.product, p.version].filter(Boolean).join(' ');
                    portHtml += `<tr><td><span class="tag tag-green">${p.port}/${p.proto}</span></td><td>${p.state||'-'}</td><td>${svc||'-'}</td></tr>`;
                });
                portHtml += '</table>';
            }

            let bannerHtml = '';
            if (banners.length) {
                bannerHtml = '<div class="section-label">Banner 信息</div><table><tr><th>端口</th><th>服务</th><th>Banner</th></tr>';
                banners.forEach(b => {
                    bannerHtml += `<tr><td><span class="tag tag-green">${b.port}</span></td><td>${escHtml(b.service)}</td><td style="font-family:var(--mono);font-size:11px;color:var(--text-secondary);word-break:break-all">${escHtml(b.banner)}</td></tr>`;
                });
                bannerHtml += '</table>';
            }

            let webHtml = '';
            if (webInfo.length) {
                webHtml = '<div class="section-label">Web 站点</div><table><tr><th>URL</th><th>状态</th><th>信息</th></tr>';
                webInfo.forEach(w => {
                    const cls = w.status >= 300 && w.status < 400 ? 'tag-orange' : 'tag-blue';
                    const redirect = w.redirect ? ` <span style="color:var(--warning)">&rarr; ${escHtml(w.redirect)}</span>` : '';
                    const title = w.title ? ` <span class="web-title">"${escHtml(w.title)}"</span>` : '';
                    const tech = w.tech ? ` <span style="color:var(--info);font-size:11px">[${escHtml(w.tech)}]</span>` : '';
                    // HTTP 指纹
                    let fingerprint = '';
                    if (w.headers) {
                        const fp = [];
                        if (w.headers.server) fp.push(w.headers.server);
                        if (w.headers.powered_by) fp.push(w.headers.powered_by);
                        if (w.headers.framework) fp.push(w.headers.framework);
                        if (w.headers.cms) fp.push(w.headers.cms);
                        if (fp.length) fingerprint = ` <span style="color:var(--info);font-size:11px">[${fp.map(escHtml).join(', ')}]</span>`;
                    }
                    // SSL 证书
                    let sslHtml = '';
                    if (w.ssl && w.ssl.subject) {
                        const sslWarn = w.ssl.expired ? ' <span style="color:var(--danger)">[已过期]</span>' : '';
                        const cipherInfo = w.ssl.cipher ? ` | ${escHtml(w.ssl.cipher)}` : '';
                        sslHtml = `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">SSL: ${escHtml(w.ssl.subject)} | 颁发: ${escHtml(w.ssl.issuer)} | ${escHtml(w.ssl.not_after)}${cipherInfo}${sslWarn}</div>`;
                    }
                    webHtml += `<tr><td style="font-family:var(--mono);font-size:11.5px">${escHtml(w.url)}</td><td><span class="tag ${cls}">${w.status}</span></td><td>${title}${tech}${fingerprint}${redirect}${sslHtml}</td></tr>`;
                });
                webHtml += '</table>';
            }

            html += `<div class="host-card">
                <div class="host-top">
                    <span class="host-name">[${idx}] ${escHtml(host.hostname||host.ip)}</span>
                    <span class="host-ip">${escHtml(host.ip)}</span>
                </div>
                <div class="host-body">
                    ${osHtml}
                    ${ports.length ? portHtml : '<div class="no-data">无开放端口</div>'}
                    ${bannerHtml}
                    ${webInfo.length ? webHtml : ''}
                </div>
            </div>`;
        });
        html += '</div>';
        list.innerHTML += html;
    });

    area.dataset.taskId = document.getElementById('logBox').dataset.lastTaskId || '';
}

// Check available tools on page load
(function checkTools(){
    fetch('/api/tools').then(r=>r.json()).then(tools => {
        // tools: {subfinder: {available: bool, caps: [...]}, ...}
        const toolAvail = {};
        for (const [name, info] of Object.entries(tools)) {
            toolAvail[name] = info.available;
        }
        // Mark select options with availability status
        document.querySelectorAll('.engine-item select').forEach(sel => {
            sel.querySelectorAll('option[value]:not([value="auto"])').forEach(opt => {
                const name = opt.value;
                const avail = toolAvail[name] !== false;
                if (!avail) {
                    opt.textContent += ' (未安装)';
                    opt.classList.add('disabled');
                }
            });
        });
    }).catch(() => {});
})();

// Store last task ID
(function(){
    const origFetch = window.fetch;
    window.fetch = function() {
        return origFetch.apply(this, arguments).then(r => {
            if (r.url.includes('/api/scan') && r.ok) {
                r.clone().json().then(d => {
                    if (d.task_id) document.getElementById('logBox').dataset.lastTaskId = d.task_id;
                });
            }
            return r;
        });
    };
})();

function download(fmt) {
    const taskId = document.getElementById('logBox').dataset.lastTaskId;
    if (!taskId) { alert('无可用结果'); return; }
    window.open('/api/download/' + taskId + '/' + fmt, '_blank');
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}
</script>
</body>
</html>
